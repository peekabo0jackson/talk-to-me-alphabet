<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sequoia's Letters</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&display=swap" rel="stylesheet">
<!-- Web Audio API used for instant phonics playback -->
<style>
*, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    background-color: #f0e4cc;
    background-image:
        repeating-linear-gradient(
            -45deg,
            transparent,
            transparent 58px,
            rgba(224, 160, 180, 0.15) 58px,
            rgba(224, 160, 180, 0.15) 60px,
            transparent 60px,
            transparent 118px,
            rgba(160, 190, 224, 0.15) 118px,
            rgba(160, 190, 224, 0.15) 120px
        );
    font-family: 'Fredoka', sans-serif;
    overflow-x: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    position: relative;
    z-index: 1;
    max-width: 1020px;
    width: 100%;
    margin: 0 auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

h1 {
    font-family: 'Fredoka', sans-serif;
    font-size: 2.4em;
    font-weight: 700;
    color: #6b5b3e;
    text-shadow: 0 2px 4px rgba(107, 91, 62, 0.12);
    margin-bottom: 16px;
    text-align: center;
    letter-spacing: 0.5px;
}

/* ========== Controls ========== */
.controls {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    justify-content: center;
    margin-bottom: 22px;
}

.control-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
}

.control-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Fredoka', sans-serif;
    font-size: 0.8em;
    font-weight: 700;
    color: #6b5b3e;
    letter-spacing: 0.5px;
}

.control-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
}

.control-dot.layout-dot { background: #f4a259; }
.control-dot.case-dot { background: #9dc08b; }
.control-dot.audio-dot { background: #b39ddb; }

.control-arrow {
    font-size: 0.65em;
    color: #8a7a5e;
    margin-left: 2px;
}

.pill-track {
    display: flex;
    background: #d4c5a0;
    border-radius: 20px;
    padding: 3px;
    gap: 0;
}

.pill-option {
    padding: 7px 16px;
    font-family: 'Fredoka', sans-serif;
    font-size: 0.85em;
    font-weight: 700;
    color: #7a6b4e;
    background: transparent;
    border: none;
    border-radius: 17px;
    cursor: pointer;
    transition: all 0.18s ease;
    user-select: none;
    white-space: nowrap;
}

.pill-option:hover {
    color: #5a4b2e;
}

.pill-option.active {
    background: #fff;
    color: #5a4b2e;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}

/* ========== Letter Grid ========== */
#letter-grid {
    display: grid;
    grid-template-columns: repeat(9, 100px);
    gap: 15px;
    justify-content: center;
    justify-items: center;
}

#letter-grid.qwerty-layout {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
}

.qwerty-row {
    display: flex;
    justify-content: center;
    gap: 12px;
}

/* ========== Letter Containers ========== */
.letter-container {
    width: 100px;
    height: 120px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    transition: transform 0.1s ease;
}

.letter-container.entering {
    animation: appear 0.45s ease both;
}

.letter-container:hover {
    transform: scale(1.08);
}

.letter-container.active {
    animation: dance 800ms ease forwards;
    z-index: 10;
    opacity: 1;
}

@keyframes appear {
    from { opacity: 0; transform: scale(0.5) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}

@keyframes dance {
    0% { transform: scale(1) rotate(0deg) translateY(0); }
    10% { transform: scale(1.5) rotate(-12deg) translateY(-15px); }
    20% { transform: scale(1.5) rotate(10deg) translateY(-12px); }
    30% { transform: scale(1.45) rotate(-8deg) translateY(-15px); }
    40% { transform: scale(1.45) rotate(8deg) translateY(-10px); }
    50% { transform: scale(1.4) rotate(-5deg) translateY(-12px); }
    60% { transform: scale(1.35) rotate(5deg) translateY(-8px); }
    70% { transform: scale(1.25) rotate(-3deg) translateY(-5px); }
    80% { transform: scale(1.15) rotate(2deg) translateY(-3px); }
    90% { transform: scale(1.05) rotate(-1deg) translateY(-1px); }
    100% { transform: scale(1) rotate(0deg) translateY(0); }
}

/* ========== Letter Character ========== */
.letter-char {
    font-family: 'Fredoka', sans-serif;
    font-size: 80px;
    font-weight: 700;
    line-height: 1;
    -webkit-text-stroke: 2.5px var(--stroke-color);
    paint-order: stroke fill;
    color: var(--fill-color);
    position: relative;
    display: block;
    text-align: center;
}

/* ========== SVG Face System ========== */
.face-svg {
    position: absolute;
    top: 10%;
    left: 15%;
    width: 70%;
    height: 75%;
    pointer-events: none;
    z-index: 2;
    color: var(--stroke-color);
}

.face-svg .blink-target {
    transform-origin: center;
    transition: transform 0.1s;
}

.face-svg.blinking .blink-target {
    transform: scaleY(0.1);
}

.face-svg.default { display: block; }
.face-svg.singing { display: none; }
.letter-container.active .face-svg.default { display: none; }
.letter-container.active .face-svg.singing { display: block; }

/* ========== Particles ========== */
.particle {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 11;
    animation: particleFly 500ms ease-out forwards;
}

@keyframes particleFly {
    0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
    }
    100% {
        transform: translate(var(--px), var(--py)) scale(0.3);
        opacity: 0;
    }
}

/* ========== Fullscreen Button ========== */
.fullscreen-btn {
    position: fixed;
    bottom: 18px;
    right: 18px;
    z-index: 100;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: rgba(240, 228, 204, 0.75);
    color: #8a7a5e;
    font-size: 1.2em;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.18s ease;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.fullscreen-btn:hover {
    background: rgba(240, 228, 204, 0.95);
    transform: scale(1.08);
}

/* ========== Responsive ========== */
@media (max-width: 700px) {
    #letter-grid:not(.qwerty-layout) {
        grid-template-columns: repeat(6, 80px);
        gap: 10px;
    }
    .letter-container {
        width: 80px;
        height: 100px;
    }
    .letter-char {
        font-size: 60px;
        -webkit-text-stroke-width: 2px;
    }
    h1 { font-size: 1.8em; }
    .container { padding: 14px 10px 50px; }
    .qwerty-layout .letter-container {
        width: 64px;
        height: 80px;
    }
    .qwerty-layout .letter-char {
        font-size: 48px;
    }
    .qwerty-row { gap: 8px; }
    .controls { gap: 14px; }
}

@media (max-width: 450px) {
    #letter-grid:not(.qwerty-layout) {
        grid-template-columns: repeat(5, 62px);
        gap: 8px;
    }
    .letter-container {
        width: 62px;
        height: 82px;
    }
    .letter-char {
        font-size: 46px;
        -webkit-text-stroke-width: 1.8px;
    }
    h1 { font-size: 1.4em; }
    .pill-option { padding: 6px 11px; font-size: 0.78em; }
    .qwerty-layout .letter-container {
        width: 50px;
        height: 66px;
    }
    .qwerty-layout .letter-char {
        font-size: 36px;
    }
    .qwerty-row { gap: 5px; }
    .controls { gap: 10px; }
}
</style>
</head>
<body>

<div class="container">
    <h1>Sequoia's Letters</h1>

    <div class="controls">
        <div class="control-group">
            <div class="control-label">
                <span class="control-dot layout-dot"></span>
                LAYOUT
                <span class="control-arrow">&#9660;</span>
            </div>
            <div class="pill-track">
                <button class="pill-option" data-group="layout" data-value="abc" onclick="setLayout('abc')">ABC</button>
                <button class="pill-option active" data-group="layout" data-value="qwerty" onclick="setLayout('qwerty')">Keyboard</button>
            </div>
        </div>

        <div class="control-group">

            </div>
        </div>

        <div class="control-group">
            <div class="control-label">
                <span class="control-dot audio-dot"></span>

            </div>
            <div class="pill-track">
                <button class="pill-option" data-group="audio" data-value="names" onclick="setAudio('names')">Letter Names</button>
                <button class="pill-option active" data-group="audio" data-value="sounds" onclick="setAudio('sounds')">Letter Sounds</button>
            </div>
        </div>
    </div>

    <div id="letter-grid"></div>
</div>

<button class="fullscreen-btn" onclick="toggleFullscreen()" title="Fullscreen">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>
    </svg>
</button>

<script>
// ========== State ==========
let useUppercase = true;
let useSoundsMode = true;
let layoutMode = 'qwerty';
let selectedVoice = null;

// ========== Data ==========
const abcOrder = 'abcdefghijklmnopqrstuvwxyz'.split('');
const qwertyRows = [
    ['q','w','e','r','t','y','u','i','o','p'],
    ['a','s','d','f','g','h','j','k','l'],
    ['z','x','c','v','b','n','m']

// Colors mapped by Sequoia from the original ABCya reference!
const letterColors = {

    b: '#7098C0', // blue

    d: '#80B868', // green
    e: '#E8D068', // yellow

function darkenColor(hex, amount) {
    const r = Math.max(0, parseInt(hex.slice(1, 3), 16) - amount);
    const g = Math.max(0, parseInt(hex.slice(3, 5), 16) - amount);
    const b = Math.max(0, parseInt(hex.slice(5, 7), 16) - amount);
    return '#' + [r, g, b].map(c => c.toString(16).padStart(2, '0')).join('');
}

// ========== SVG Face Definitions ==========
const faceDefs = {
    a: { eyeType: 'dot', eyeY: 35, eyeSpread: 12, eyeR: 4, mouthType: 'worried', mouthY: 60 },
    b: { eyeType: 'dot', eyeY: 30, eyeSpread: 9, eyeR: 3.5, mouthType: 'neutral', mouthY: 52 },
    c: { eyeType: 'squint', eyeY: 35, eyeSpread: 10, mouthType: 'frown', mouthY: 60 },
    d: { eyeType: 'wide', eyeY: 32, eyeSpread: 10, eyeR: 4, mouthType: 'tooth', mouthY: 60 },
    e: { eyeType: 'squint', eyeY: 32, eyeSpread: 10, mouthType: 'frown', mouthY: 58 },
    f: { eyeType: 'squint', eyeY: 28, eyeSpread: 10, mouthType: 'frown', mouthY: 50 },
    g: { eyeType: 'wide', eyeY: 35, eyeSpread: 10, eyeR: 4, mouthType: 'open', mouthY: 60 },
    h: { eyeType: 'dot', eyeY: 32, eyeSpread: 14, eyeR: 3, mouthType: 'neutral', mouthY: 55 },

    j: { eyeType: 'dot', eyeY: 30, eyeSpread: 8, eyeR: 3.5, mouthType: 'worried', mouthY: 55 },
    k: { eyeType: 'squint', eyeY: 32, eyeSpread: 10, mouthType: 'frown', mouthY: 55 },
    l: { eyeType: 'happy', eyeY: 38, eyeSpread: 8, mouthType: 'smile', mouthY: 62 },
    m: { eyeType: 'dot', eyeY: 32, eyeSpread: 14, eyeR: 3.5, mouthType: 'worried', mouthY: 55 },
    n: { eyeType: 'dot', eyeY: 32, eyeSpread: 12, eyeR: 4, mouthType: 'open', mouthY: 58 },
    o: { eyeType: 'verywide', eyeY: 32, eyeSpread: 14, eyeR: 4, mouthType: 'bigopen', mouthY: 62 },
    p: { eyeType: 'dot', eyeY: 30, eyeSpread: 8, eyeR: 3, mouthType: 'neutral', mouthY: 52 },
    q: { eyeType: 'wide', eyeY: 35, eyeSpread: 12, eyeR: 4, mouthType: 'open', mouthY: 60 },
    r: { eyeType: 'squint', eyeY: 30, eyeSpread: 10, mouthType: 'frown', mouthY: 54 },
    s: { eyeType: 'happy', eyeY: 30, eyeSpread: 8, mouthType: 'bigsmile', mouthY: 62 },
    t: { eyeType: 'dot', eyeY: 32, eyeSpread: 8, eyeR: 3, mouthType: 'neutral', mouthY: 55 },
    u: { eyeType: 'squint', eyeY: 34, eyeSpread: 12, mouthType: 'frown', mouthY: 62 },
    v: { eyeType: 'dot', eyeY: 30, eyeSpread: 12, eyeR: 4, mouthType: 'worried', mouthY: 56 },
    w: { eyeType: 'dot', eyeY: 30, eyeSpread: 16, eyeR: 3.5, mouthType: 'frown', mouthY: 52 },
    x: { eyeType: 'dot', eyeY: 32, eyeSpread: 12, eyeR: 4, mouthType: 'frown', mouthY: 58 },
    y: { eyeType: 'squint', eyeY: 30, eyeSpread: 12, mouthType: 'frown', mouthY: 54 },
    z: { eyeType: 'wide', eyeY: 30, eyeSpread: 10, eyeR: 4, mouthType: 'frown', mouthY: 58 },
};

function generateFaceSVG(def) {
    const parts = [];
    const cx = 50;

    // LEFT EYE and RIGHT EYE
    const lex = cx - def.eyeSpread;
    const rex = cx + def.eyeSpread;
    const ey = def.eyeY;
    const r = def.eyeR || 4;

    switch(def.eyeType) {
        case 'dot':
            parts.push('<circle class="blink-target" cx="' + lex + '" cy="' + ey + '" r="' + r + '" fill="currentColor"/>');
            parts.push('<circle class="blink-target" cx="' + rex + '" cy="' + ey + '" r="' + r + '" fill="currentColor"/>');
            break;
        case 'wide':
            parts.push('<circle class="blink-target" cx="' + lex + '" cy="' + ey + '" r="' + (r + 2) + '" fill="currentColor"/>');
            parts.push('<circle class="blink-target" cx="' + rex + '" cy="' + ey + '" r="' + (r + 2) + '" fill="currentColor"/>');
            break;
        case 'verywide':
            parts.push('<circle class="blink-target" cx="' + lex + '" cy="' + ey + '" r="' + (r + 4) + '" fill="currentColor"/>');
            parts.push('<circle class="blink-target" cx="' + rex + '" cy="' + ey + '" r="' + (r + 4) + '" fill="currentColor"/>');
            break;
        case 'squint':
            parts.push('<line class="blink-target" x1="' + (lex-6) + '" y1="' + ey + '" x2="' + (lex+6) + '" y2="' + ey + '" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>');
            parts.push('<line class="blink-target" x1="' + (rex-6) + '" y1="' + ey + '" x2="' + (rex+6) + '" y2="' + ey + '" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>');
            break;
        case 'happy':
            parts.push('<path class="blink-target" d="M' + (lex-5) + ',' + ey + ' Q' + lex + ',' + (ey-5) + ' ' + (lex+5) + ',' + ey + '" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"/>');
            parts.push('<path class="blink-target" d="M' + (rex-5) + ',' + ey + ' Q' + rex + ',' + (ey-5) + ' ' + (rex+5) + ',' + ey + '" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"/>');
            break;
    }

    // MOUTH
    const my = def.mouthY;
    switch(def.mouthType) {
        case 'smile':
            parts.push('<path d="M' + (cx-8) + ',' + my + ' Q' + cx + ',' + (my+9) + ' ' + (cx+8) + ',' + my + '" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"/>');
            break;
        case 'bigsmile':
            parts.push('<path d="M' + (cx-10) + ',' + my + ' Q' + cx + ',' + (my+12) + ' ' + (cx+10) + ',' + my + '" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"/>');
            break;
        case 'frown':
            parts.push('<path d="M' + (cx-7) + ',' + (my+4) + ' Q' + cx + ',' + (my-4) + ' ' + (cx+7) + ',' + (my+4) + '" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"/>');
            break;
        case 'open':
            parts.push('<ellipse cx="' + cx + '" cy="' + my + '" rx="5" ry="7" fill="currentColor"/>');
            break;
        case 'bigopen':
            parts.push('<circle cx="' + cx + '" cy="' + my + '" r="11" fill="currentColor"/>');
            break;
        case 'worried':
            parts.push('<ellipse cx="' + cx + '" cy="' + my + '" rx="4" ry="5" fill="currentColor"/>');
            break;
        case 'neutral':
            parts.push('<line x1="' + (cx-6) + '" y1="' + my + '" x2="' + (cx+6) + '" y2="' + my + '" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>');
            break;
        case 'wavy':
            parts.push('<path d="M' + (cx-8) + ',' + my + ' Q' + (cx-4) + ',' + (my-4) + ' ' + cx + ',' + my + ' Q' + (cx+4) + ',' + (my+4) + ' ' + (cx+8) + ',' + my + '" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>');
            break;
        case 'tooth':
            parts.push('<ellipse cx="' + cx + '" cy="' + my + '" rx="6" ry="9" fill="currentColor"/>');
            parts.push('<rect x="' + (cx-2) + '" y="' + (my-8) + '" width="4" height="5" fill="#eee" rx="1"/>');
            break;
    }

    return parts.join('\n');
}

function generateSingingFaceSVG(def) {
    const parts = [];
    const cx = 50;

    // Singing eyes: wide circles with r=5, same position as default
    const lex = cx - def.eyeSpread;
    const rex = cx + def.eyeSpread;
    const ey = def.eyeY;

    parts.push('<circle class="blink-target" cx="' + lex + '" cy="' + ey + '" r="5" fill="currentColor"/>');
    parts.push('<circle class="blink-target" cx="' + rex + '" cy="' + ey + '" r="5" fill="currentColor"/>');

    // Singing mouth: bigopen at same mouthY
    const my = def.mouthY;
    parts.push('<circle cx="' + cx + '" cy="' + my + '" r="11" fill="currentColor"/>');

    return parts.join('\n');
}

// Pre-recorded phonics sounds (human voice, base64 MP3)
// HYBRID: Web Audio API for instant playback + Audio element fallback for first interaction
const phonicsPlayers = {};
const namePlayers = {};
let audioCtx = null;
let audioUnlockPromise = null;
let backgroundDecodeStarted = false;
const audioBuffers = {};
const audioBufferPromises = {};
const nameAudioBuffers = {};
const nameAudioBufferPromises = {};

// Decode a single audio data URI to an AudioBuffer
async function decodeOneAudio(dataUri) {
    const base64 = dataUri.split(',')[1];
    const bin = atob(base64);
    const buf = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
    return audioCtx.decodeAudioData(buf.buffer.slice(0));
}

function createAudioContext() {
    const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
    if (!AudioContextCtor) return null;
    audioCtx = new AudioContextCtor({ latencyHint: 'interactive' });
    return audioCtx;
}

async function resumeAudioContext(ctx) {
    if (!ctx) return null;
    if (ctx.state === 'running') return ctx;
    await ctx.resume().catch(() => {});
    if (ctx.state === 'running') return ctx;
    return null;
}

function startBackgroundDecodeOnce() {
    if (backgroundDecodeStarted || !audioCtx) return;
    backgroundDecodeStarted = true;
    startBackgroundDecode();
}

async function ensureAudioContext() {
    if (!audioCtx || audioCtx.state === 'closed') {
        if (!createAudioContext()) return null;
    }

    if (audioCtx.state === 'running') {
        startBackgroundDecodeOnce();
        return audioCtx;
    }

    if (!audioUnlockPromise) {
        const currentCtx = audioCtx;
        audioUnlockPromise = resumeAudioContext(currentCtx).then(ctx => {
            if (ctx) return ctx;

            // Chrome can ignore the first resume() and leave the context suspended.
            if (audioCtx === currentCtx) {
                const freshCtx = createAudioContext();
                return resumeAudioContext(freshCtx);
            }

            return resumeAudioContext(audioCtx);
        }).then(ctx => {
            if (ctx && ctx.state === 'running') {
                startBackgroundDecodeOnce();
                return ctx;
            }
            return null;
        }).finally(() => {
            audioUnlockPromise = null;
        });
    }

    return audioUnlockPromise;
}

function getDecodedBuffer(letter, dataMap, store, pendingStore) {
    if (store[letter]) return Promise.resolve(store[letter]);
    if (pendingStore[letter]) return pendingStore[letter];

    const dataUri = dataMap[letter];
    if (!dataUri) return Promise.resolve(null);

    pendingStore[letter] = decodeOneAudio(dataUri).then(buffer => {
        store[letter] = buffer;
        return buffer;
    }).finally(() => {
        delete pendingStore[letter];
    });

    return pendingStore[letter];
}

function playBuffer(buffer) {
    if (!audioCtx || audioCtx.state !== 'running' || !buffer) return false;
    const src = audioCtx.createBufferSource();
    src.buffer = buffer;
    src.connect(audioCtx.destination);
    src.start(0);
    return true;
}

async function playBufferedLetter(letter, dataMap, store, pendingStore) {
    if (audioCtx && audioCtx.state === 'running' && store[letter]) {
        playBuffer(store[letter]);
        return true;
    }

    const ctx = await ensureAudioContext();
    if (!ctx) return false;

    const buffer = await getDecodedBuffer(letter, dataMap, store, pendingStore);
    if (!buffer) return false;

    if (audioCtx.state !== 'running') {
        const resumedCtx = await ensureAudioContext();
        if (!resumedCtx) return false;
    }

    return playBuffer(buffer);
}

// Background decode: one letter per frame, no main thread blocking
function startBackgroundDecode() {
    const all = [
        ...Object.keys(phonicsData).map(letter => ['p', letter]),
        ...Object.keys(letterNameData).map(letter => ['n', letter])
    ];
    let i = 0;
    function next() {
        if (i >= all.length) return;
        const [type, letter] = all[i++];
        const dataMap = type === 'p' ? phonicsData : letterNameData;
        const store = type === 'p' ? audioBuffers : nameAudioBuffers;
        const pendingStore = type === 'p' ? audioBufferPromises : nameAudioBufferPromises;
        if (!store[letter] && !pendingStore[letter]) {
            getDecodedBuffer(letter, dataMap, store, pendingStore).catch(() => {});
        }
        requestAnimationFrame(next);
    }
    next();
}

function playPhonics(letter) {
    playBufferedLetter(letter, phonicsData, audioBuffers, audioBufferPromises).catch(() => {});
}

function playLetterName(letter) {
    if (!letterNameData[letter]) return false;
    playBufferedLetter(letter, letterNameData, nameAudioBuffers, nameAudioBufferPromises).catch(() => {});
    return true;
}

const letterNames = {
    a: 'ay', b: 'bee', c: 'see', d: 'dee', e: 'ee',
    f: 'eff', g: 'jee', h: 'aytch', i: 'eye', j: 'jay',
    k: 'kay', l: 'ell', m: 'em', n: 'en', o: 'oh',
    p: 'pee', q: 'cue', r: 'are', s: 'ess', t: 'tee',
    u: 'you', v: 'vee', w: 'double you', x: 'ex', y: 'why', z: 'zee'
};

const particleColors = ['#E8A54B', '#8EABC8', '#8FB87F', '#C4A8D1', '#E8D46A', '#D47A5F', '#B09DC8', '#9B82B5'];

// ========== Voice Selection ==========
function pickVoice() {
    const voices = speechSynthesis.getVoices();
    if (!voices.length) return;
    const samantha = voices.find(v => /samantha/i.test(v.name));
    if (samantha) { selectedVoice = samantha; return; }
    const enUS = voices.find(v => /en[-_]US/i.test(v.lang));
    if (enUS) { selectedVoice = enUS; return; }
    const en = voices.find(v => /^en/i.test(v.lang));
    if (en) { selectedVoice = en; return; }
    selectedVoice = voices[0];
}

speechSynthesis.onvoiceschanged = pickVoice;
pickVoice();

// ========== Build Letter ==========
function buildLetter(letter, index) {
    const container = document.createElement('div');
    container.className = 'letter-container';
    container.dataset.letter = letter;
    container.style.animationDelay = (index * 30) + 'ms';

    const display = useUppercase ? letter.toUpperCase() : letter;
    const fill = letterColors[letter];
    const stroke = darkenColor(fill, 50);
    const def = faceDefs[letter];

    container.style.setProperty('--fill-color', fill);
    container.style.setProperty('--stroke-color', stroke);

    // Letter character
    const charEl = document.createElement('span');
    charEl.className = 'letter-char';
    charEl.textContent = display;
    container.appendChild(charEl);

    // Default face SVG
    const defaultSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    defaultSvg.setAttribute('class', 'face-svg default');
    defaultSvg.setAttribute('viewBox', '0 0 100 100');
    defaultSvg.innerHTML = generateFaceSVG(def);
    container.appendChild(defaultSvg);

    // Singing face SVG
    const singingSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    singingSvg.setAttribute('class', 'face-svg singing');
    singingSvg.setAttribute('viewBox', '0 0 100 100');
    singingSvg.innerHTML = generateSingingFaceSVG(def);
    container.appendChild(singingSvg);

    container.classList.add('entering');
    container.addEventListener('animationend', function handler(e) {
        if (e.animationName === 'appear') {
            container.classList.remove('entering');
            container.removeEventListener('animationend', handler);
        }
    });

    container.addEventListener('click', () => activateLetter(letter));
    return container;
}

// ========== Build Grid ==========
function buildGrid() {
    const grid = document.getElementById('letter-grid');
    grid.innerHTML = '';
    grid.className = '';

    if (layoutMode === 'qwerty') {
        grid.classList.add('qwerty-layout');
        let idx = 0;
        qwertyRows.forEach(row => {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'qwerty-row';
            row.forEach(letter => {
                rowDiv.appendChild(buildLetter(letter, idx));
                idx++;
            });
            grid.appendChild(rowDiv);
        });
    } else {
        abcOrder.forEach((letter, idx) => {
            grid.appendChild(buildLetter(letter, idx));
        });
    }
}

// ========== Activate Letter ==========
function activateLetter(letter) {
    // Prepare animation
    const container = document.querySelector('.letter-container[data-letter="' + letter + '"]');
    if (!container) return;
    container.classList.remove('active');
    void container.offsetWidth;
    container.classList.add('active');

    // Sound + particles in same frame — animation and audio start together
    if (useSoundsMode) {
        playPhonics(letter);
    } else {
        if (!playLetterName(letter)) {
            const text = letterNames[letter];
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.85;
            utterance.pitch = 1.1;
            utterance.volume = 1;
            if (selectedVoice) utterance.voice = selectedVoice;
            speechSynthesis.cancel();
            speechSynthesis.speak(utterance);
        }
    }
    createParticles(container);

    setTimeout(() => {
        container.classList.remove('active');
        container.style.opacity = '1';
    }, 850);
}

// ========== Particles ==========
function createParticles(container) {
    for (let i = 0; i < 8; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const angle = (i / 8) * Math.PI * 2;
        const dist = 45 + Math.random() * 25;
        const x = Math.cos(angle) * dist;
        const y = Math.sin(angle) * dist;
        p.style.setProperty('--px', x + 'px');
        p.style.setProperty('--py', y + 'px');
        p.style.background = particleColors[i % particleColors.length];
        p.style.left = 'calc(50% - 3px)';
        p.style.top = 'calc(50% - 3px)';
        container.appendChild(p);
        setTimeout(() => p.remove(), 550);
    }
}

// ========== Random Blink ==========
function randomBlink() {
    const containers = document.querySelectorAll('.letter-container:not(.active)');
    if (containers.length) {
        const target = containers[Math.floor(Math.random() * containers.length)];
        const defaultFace = target.querySelector('.face-svg.default');
        if (defaultFace) {
            defaultFace.classList.add('blinking');
            setTimeout(() => defaultFace.classList.remove('blinking'), 160);
        }
    }
    setTimeout(randomBlink, 2000 + Math.random() * 2000);
}

// ========== Controls ==========
function setLayout(val) {
    layoutMode = val;
    updateControlGroup('layout', val);
    buildGrid();
}

function setCase(val) {
    useUppercase = val === 'upper';
    updateControlGroup('case', val);
    buildGrid();
}

function setAudio(val) {
    useSoundsMode = val === 'sounds';
    updateControlGroup('audio', val);
}

function updateControlGroup(group, val) {
    document.querySelectorAll('.pill-option[data-group="' + group + '"]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.value === val);
    });
}

// ========== Fullscreen ==========
function toggleFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
    } else {
        document.exitFullscreen();
    }
}

function primeAudio() {
    ensureAudioContext().catch(() => {});
}

// ========== Keyboard Input (with hold-to-repeat) ==========
let heldKey = null;
let holdInterval = null;

document.addEventListener('keydown', e => {
    const key = e.key.toLowerCase();
    if (!/^[a-z]$/.test(key)) return;
    e.preventDefault();

    if (heldKey === key) return; // already holding this key

    // Clear any previous hold
    clearInterval(holdInterval);
    heldKey = key;

    // Play immediately
    activateLetter(key);

    // Repeat every 2 seconds while held
    holdInterval = setInterval(() => activateLetter(key), 2000);
});

document.addEventListener('keyup', e => {
    const key = e.key.toLowerCase();
    if (key === heldKey) {
        heldKey = null;
        clearInterval(holdInterval);
        holdInterval = null;
    }
});

// ========== Init ==========
document.addEventListener('pointerdown', primeAudio, { capture: true, passive: true });
document.addEventListener('touchstart', primeAudio, { capture: true, passive: true });
document.addEventListener('keydown', primeAudio, { capture: true });
buildGrid();
setTimeout(randomBlink, 2500);
